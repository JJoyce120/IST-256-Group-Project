<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Order History</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</head>

<body>

<div class="container my-5">
    <h2 class="text-center mb-4">Submission History</h2>

    <div id="history"></div>
</div>

<script>
$.get("http://localhost:3000/submissions", function(data){

    let output = "";

    data.forEach(s => {
        output += `
            <div class="card p-3 mb-3">
                <h5>${s.name}</h5>
                <p>${s.email}</p>
                <p>Participation: ${s.participation}</p>
                <p>Sessions: ${s.sessions.join(", ")}</p>
                <p>Status: <strong>${s.status}</strong></p>
            </div>
        `;
    });

    $("#history").html(output);
});
</script>

</body>
</html>
