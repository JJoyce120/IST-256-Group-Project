<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Approval Page</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark" style="background-color:#041E42;">
    <div class="container">
        <a class="navbar-brand fw-bold" href="index.html">PSU IST SYMPOSIUM</a>
        <div class="navbar-nav ms-auto">
            <a class="nav-link" href="index.html">Home</a>
            <a class="nav-link" href="register.html">Register</a>
            <a class="nav-link" href="cart.html">Cart</a>
            <a class="nav-link" href="history.html">History</a>
            <a class="nav-link active" href="approval.html">Approval</a>
        </div>
    </div>
</nav>
    
<div class="container my-5">
    <h2 class="text-center mb-4">Pending Submissions</h2>

    <div id="pending"></div>
</div>

<script>
function loadPending() {
    $.get("http://localhost:3000/submissions", function(data){

        let pending = data.filter(s => s.status === "pending");

        let output = "";

        pending.forEach(s => {
            output += `
                <div class="card p-3 mb-3">
                    <h5>${s.name}</h5>
                    <p>${s.email}</p>
                    <p>${s.participation}</p>
                    <p>${s.sessions.join(", ")}</p>

                    <button class="btn btn-success me-2" onclick="updateStatus(${s.id}, 'approved')">
                        Approve
                    </button>

                    <button class="btn btn-danger" onclick="updateStatus(${s.id}, 'declined')">
                        Decline
                    </button>
                </div>
            `;
        });

        $("#pending").html(output);
    });
}

function updateStatus(id, status){
    $.ajax({
        url: "http://localhost:3000/submissions/" + id,
        method: "PUT",
        contentType: "application/json",
        data: JSON.stringify({ status: status }),
        success: function(){
            loadPending();
        }
    });
}

loadPending();
</script>

</body>
</html>
