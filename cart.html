<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Symposium | Shopping Cart</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark" style="background-color:#041E42;">
    <div class="container">
        <a class="navbar-brand fw-bold" href="index.html">PSU IST SYMPOSIUM</a>
        <div class="navbar-nav ms-auto">
            <a class="nav-link" href="index.html">Home</a>
            <a class="nav-link" href="register.html">Register</a>
            <a class="nav-link active" href="cart.html">Cart</a>
            <a class="nav-link" href="history.html">History</a>
            <a class="nav-link" href="approval.html">Approval</a>
        </div>
    </div>
</nav>

<div class="container my-5">

    <h2 class="text-center mb-4">Shopping Cart</h2>

    <input type="text" id="searchInput" class="form-control mb-4" placeholder="Search products...">

    <div class="card p-3 mb-4">
        <h5>Add New Product</h5>

        <form id="productForm" class="row g-2">

            <div class="col-md-3">
                <input id="prodDesc" class="form-control" placeholder="Description" required>
            </div>

            <div class="col-md-2">
                <input id="prodCategory" class="form-control" placeholder="Category" required>
            </div>

            <div class="col-md-2">
                <input id="prodUnit" class="form-control" placeholder="Unit" required>
            </div>

            <div class="col-md-2">
                <input id="prodPrice" class="form-control" placeholder="Price" required>
            </div>

            <div class="col-md-3">
                <button type="submit" class="btn btn-primary w-100">Add Product</button>
            </div>

        </form>
    </div>

    <h4>Available Products</h4>
    <div id="productList" class="d-flex flex-wrap"></div>

    <h4 class="mt-4">Your Cart</h4>
    <ul id="cartList" class="list-group mb-3"></ul>

    <button class="btn btn-success" onclick="sendCartToAPI()">
        Send Cart to API
    </button>

    <h5 class="mt-4">JSON Output</h5>
    <pre id="jsonOutput" class="bg-light p-3"></pre>

</div>

<script src="js/cart.js"></script>

<script>
    $("#productForm").submit(function(e){
        e.preventDefault();

        let newProduct = {
            id: Date.now(),
            description: $("#prodDesc").val(),
            category: $("#prodCategory").val(),
            unit: $("#prodUnit").val(),
            price: parseFloat($("#prodPrice").val())
        };

        products.push(newProduct);
        displayProducts(products);

        this.reset();
    });
</script>

</body>
</html>
